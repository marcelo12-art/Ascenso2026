<div class="login-container">
  <!-- Marca de agua -->
  <div class="marca-agua"></div>

  <!-- Tarjeta principal -->
  <div class="login-card">
    <!-- Escudo -->
    <img id="escudoSistema" class="escudo" alt="Escudo del Estado" />

    <!-- Ministerio -->
    <h2 class="ministerio">
      MINISTERIO DE
      <span>EDUCACIÓN</span>
    </h2>

    <div class="linea-colores"></div>

    <!-- Título -->
    <h1 class="titulo">SIMULACRO DE EXAMEN</h1>

    <h1 class="titulo titulo-dorado">DE ASCENSO DE CATEGORÍA</h1>

    <!-- Gestión -->
    <h2 class="gestion">GESTIÓN 2026</h2>

    <!-- Código -->
    <label class="lbl-codigo"> Código de acceso </label>

    <div class="input-codigo">
      <i class="bi bi-shield-lock-fill"></i>

      <input
        id="codigo"
        type="text"
        maxlength="5"
        autocomplete="off"
        placeholder="Ingrese su código"
      />
    </div>

    <!-- WhatsApp -->
    <div class="whatsapp">
      <i class="bi bi-whatsapp"></i>

      <p>Pide tu código al WhatsApp</p>

      <h3>65612987</h3>
    </div>

    <!-- Botón -->
    <button id="btnIngresar" class="btn-ingresar">INGRESAR</button>

    <!-- Mensaje -->
    <div id="mensajeLogin" class="mensaje-login"></div>

    <!-- Pie -->
    <div class="footer-login">
      <p>Versión 1.0.0</p>
    </div>
  </div>
</div>
